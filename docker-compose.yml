services:
  chunker:
    build: ./chunker-rust
    environment:
      RAGFORGE_CHUNKER_ADDR: 0.0.0.0:8093
    ports:
      - "8093:8093"

  engine:
    build: ./engine-python
    ports:
      - "8000:8000"

  crawler:
    build: ./crawler-go
    environment:
      RAGFORGE_ADDR: ":8080"
      RAGFORGE_CHUNKER_URL: http://chunker:8093
      RAGFORGE_ENGINE_URL: http://engine:8000
      RAGFORGE_WATCH_DIR: /app/corpus
      RAGFORGE_SCAN_INTERVAL: "5"
    ports:
      - "8080:8080"
    depends_on:
      - chunker
      - engine

  dashboard:
    build: ./dashboard-ts
    environment:
      NEXT_PUBLIC_ENGINE_URL: http://localhost:8000
      NEXT_PUBLIC_CRAWLER_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - engine
      - crawler
